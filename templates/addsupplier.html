<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Supplier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheets/standard.css') }}">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin:0;}
        .container { padding: 40px; max-width: 500px; margin: auto;}
        .card { background:white; padding:25px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.08);}
        input { width: 100%; padding:10px; margin-bottom:15px; border-radius:6px; border:1px solid #ccc;}
    </style>
</head>
<body>

{% include "navbar.html" %}

<div class="container">
    <div class="card">
        <h2>Add New Supplier</h2>
        <form method="POST">
            <input type="text" name="name" placeholder="Supplier Name" required>
            <input type="text" name="address" placeholder="Address">
            <input type="text" name="city" placeholder="City" required>
            <input type="text" name="state" placeholder="State" required>
            <input type="text" name="country" placeholder="Country" required>
            <input type="text" name="zip" placeholder="Zip Code">
            <button type="submit" class="blue-btn">Add Supplier</button>
        </form>
    </div>
</div>
</body>
</html>

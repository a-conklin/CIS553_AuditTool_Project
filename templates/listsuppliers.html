<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Suppliers</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheets/standard.css') }}">
</head>
<body>

{% include "navbar.html" %}

<div class="container">
    <div class="card">
        <h2>Suppliers</h2>
        <a href="{{ url_for('add_supplier') }}">
            <button class="blue-btn">Add New Supplier</button>
        </a>

        {% if suppliers %}
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Address</th>
                    <th>City</th>
                    <th>State</th>
                    <th>Country</th>
                </tr>
            </thead>
            <tbody>
                {% for s in suppliers %}
                <tr>
                    <td>{{ s.supplier_id }}</td>
                    <td>{{ s.name }}</td>
                    <td>{{ s.address }}</td>
                    <td>{{ s.city }}</td>
                    <td>{{ s.state }}</td>
                    <td>{{ s.country }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
            <p>No suppliers found.</p>
        {% endif %}
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internal Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheets/standard.css') }}">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }
    </style>
</head>
<body>

    {% include "navbar.html" %}

    <div class="container">

        <div class="welcome-card">
            <h1>Welcome, {{ session['username'] }}</h1>
        </div>

        <div class="card-grid">
            <div class="card">
                <h3>Manage Suppliers</h3>
                <p>View or add suppliers to the system.</p>
                <a href="{{ url_for('list_suppliers') }}">
                    <button class="blue-btn" style="margin-top: 10px;">View Suppliers</button>
                </a>
            </div>

            <div class="card">
                <h3>Audit Templates</h3>
                <p>Create and manage audit templates.</p>
                <a href="{{ url_for('list_templates') }}">
                    <button class="blue-btn" style="margin-top: 10px;">View Templates</button>
                </a>
            </div>

            <div class="card">
                <h3>Run Audits</h3>
                <p>Start a new audit or continue a draft.</p>
                <a href="{{ url_for('audit_listing') }}">
                    <button class="blue-btn" style="margin-top: 10px;">View Your Audits</button>
                </a>
            </div>


        </div>

    </div>

</body>
</html>
